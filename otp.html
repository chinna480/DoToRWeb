<!DOCTYPE html>
<html>
<head>
  <title>DoToR - OTP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./logo.jpeg" type="image/x-icon">
</head>
<body>

  <div class="login-container">

    <a href="customer-login.html" class="back-btn">←</a>

    <div class="login-header">
      <div class="login-icon">📱</div>
      <h2 class="login-title">OTP Verification</h2>
      <p class="login-sub">Enter 6 digit OTP sent to your number</p>
    </div>

    <div class="otp-boxes">
      <input type="number" class="otp-box" id="b1" maxlength="1">
      <input type="number" class="otp-box" id="b2" maxlength="1">
      <input type="number" class="otp-box" id="b3" maxlength="1">
      <input type="number" class="otp-box" id="b4" maxlength="1">
      <input type="number" class="otp-box" id="b5" maxlength="1">
      <input type="number" class="otp-box" id="b6" maxlength="1">
    </div>

    <button class="orange-btn" onclick="verifyOTP()">
      Verify OTP →
    </button>

    <p class="resend-text">
      Didn't receive OTP?
      <span id="resend-link" onclick="resendOTP()">
        Resend in <span id="timer">30</span>s
      </span>
    </p>

  </div>

  <script>
  // Auto move to next box
  const boxes = document.querySelectorAll('.otp-box')
  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      if (box.value.length === 1 && i < boxes.length - 1) {
        boxes[i + 1].focus()
      }
    })
  })

  // Timer
  let seconds = 30
  const countdown = setInterval(() => {
    seconds--
    document.getElementById('timer').textContent = seconds
    if (seconds === 0) clearInterval(countdown)
  }, 1000)

  function verifyOTP() {
    // Get entered OTP
    let enteredOTP = ''
    boxes.forEach(box => enteredOTP += box.value)

    // Get saved OTP
    const savedOTP = localStorage.getItem('doторOTP')

    if (enteredOTP === savedOTP) {
      alert('OTP Verified! Welcome to DoToR!')
      window.location.href = 'home.html'
    } else {
      alert('Wrong OTP! Please try again!')
    }
  }

  function resendOTP() {
    const phone = localStorage.getItem('custPhone')
    const otp = Math.floor(100000 + Math.random() * 900000).toString()
    localStorage.setItem('doторOTP', otp)

    const apiKey = 'RbvyZAWpEo4hTXdiYngCPFLJlweN05cqz7fU3Hja2O6mxK9tBk1xwTlzqNpiFtSEdeJm5uXWKPsvOIDG'
    fetch(`https://www.fast2sms.com/dev/bulkV2?authorization=${apiKey}&variables_values=${otp}&route=otp&numbers=${phone}`)
      .then(res => res.json())
      .then(data => {
        if (data.return === true) alert('OTP Resent!')
        else alert('Failed!')
      })
  }
</script>

</body>
</html>
