<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoToR - Admin Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #2a5298 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 28px;
    }
    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--gray-border);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      background: var(--gray-light);
      transition: all 0.2s;
      outline: none;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .login-input::placeholder {
      font-weight: 400;
      color: #aaa;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--navy), #2a5298);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 35, 68, 0.3);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-error {
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      min-height: 24px;
      transition: opacity 0.3s;
    }
    .login-error.hidden { opacity: 0; }
    .login-forgot {
      font-size: 12px;
      color: var(--gray);
      margin-top: 20px;
    }
    .password-wrapper {
      position: relative;
      margin-bottom: 4px;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      color: var(--gray);
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--navy); }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🔧</div>
      <div class="login-title">DoToR Admin</div>
      <div class="login-subtitle">Enter password to access the dashboard</div>

      <form id="loginForm" autocomplete="off">
        <div class="password-wrapper">
          <input
            type="password"
            id="passwordInput"
            class="login-input"
            placeholder="Enter admin password"
            autofocus
          >
          <button type="button" class="toggle-pw" id="toggleBtn" tabindex="-1" onclick="togglePassword()">👁️</button>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">🔐 Sign In</button>
        <div class="login-error hidden" id="errorMsg">❌ Wrong password. Try again.</div>
      </form>

      <div class="login-forgot">🔑 Admin Panel — Authorized Access Only</div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'admin';

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('dotorAdmin') === 'true') {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
      window.location.href = redirect;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');
      const input = document.getElementById('passwordInput');

      if (password === ADMIN_PASSWORD) {
        // Success
        localStorage.setItem('dotorAdmin', 'true');
        btn.textContent = '✅ Signed In...';
        btn.disabled = true;
        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
        setTimeout(() => { window.location.href = redirect; }, 300);
      } else {
        // Wrong password
        errorEl.classList.remove('hidden');
        input.classList.add('shake');
        input.value = '';
        input.focus();
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    });

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // Enter key already handled by form submit
  </script>
</body>
</html>
