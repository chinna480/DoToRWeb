<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoToR - Admin Technicians</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (localStorage.getItem('dotorAdmin') !== 'true') {
      window.location.href = 'login.html?redirect=technicians.html';
    }
  </script>
  <style>
    .admin-techs { max-width: 800px; margin: 0 auto; }
    .tech-detail-modal { position: fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
    .tech-detail-modal.show { display:flex; }
    .tech-detail-content { background:var(--white); border-radius:var(--radius-lg); padding:24px; max-width:500px; width:100%; max-height:80vh; overflow-y:auto; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><span>🔧</span> DoToR Admin</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="orders.html">Orders</a>
      <a href="completed.html">Completed</a>
      <a href="technicians.html" class="active">Technicians</a>
    </div>
  </nav>

  <div class="container">
    <div class="header-card navy">
      <h1>🔧 Registered Technicians</h1>
      <p>View all technicians registered in the system</p>
    </div>

    <div class="card admin-techs">
      <div class="card-title">🔧 Technicians</div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span style="font-size:13px;color:var(--gray);" id="techCount">Loading...</span>
        <div style="display:flex;gap:8px;">
          <input type="text" id="searchTech" class="form-input" style="padding:8px 12px;font-size:12px;min-width:200px;" placeholder="Search by name or phone..." oninput="filterTechs()">
        </div>
      </div>

      <!-- Online Techs Section -->
      <h3 style="font-size:14px;font-weight:800;color:var(--green);margin-bottom:12px;">🟢 Currently Online</h3>
      <div id="onlineTechs">
        <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
      </div>

      <hr style="border:none;border-top:1px solid var(--gray-border);margin:20px 0;">

      <!-- All Registered Techs -->
      <h3 style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px;">📋 All Registered Technicians</h3>
      <div id="allTechs">
        <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <!-- Tech Detail Modal -->
  <div class="tech-detail-modal" id="techDetailModal">
    <div class="tech-detail-content">
      <button class="modal-close" onclick="document.getElementById('techDetailModal').classList.remove('show')">✕</button>
      <h3 style="font-size:18px;font-weight:800;color:var(--navy);margin-bottom:16px;">🔧 Technician Details</h3>
      <div id="techDetailBody"></div>
    </div>
  </div>

  <div class="footer">© 2025 DoToR - Admin Dashboard</div>

  <script type="module">
    import { listenTechnicians, listenTechsOnline, listenOrders } from './firebase.js';

    let allTechs = [];
    let onlineTechs = [];
    let allOrders = [];

    // ── Listen to data ────────────────────────────────────────────────
    listenTechnicians((techs) => {
      allTechs = techs;
      renderAllTechs();
    });

    listenTechsOnline((online) => {
      onlineTechs = online;
      renderOnlineTechs();
    });

    listenOrders((orders) => {
      allOrders = orders;
      // Re-render to update order counts per tech
      renderAllTechs();
    });

    // ── Render Online Techs ───────────────────────────────────────────
    function renderOnlineTechs() {
      const container = document.getElementById('onlineTechs');

      if (onlineTechs.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="padding:20px;">
            <div class="icon">🔴</div>
            <h3>No Technicians Online</h3>
            <p>No technicians are currently active. As soon as a tech opens the app, they'll appear here.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = onlineTechs.map(tech => {
        const lastSeen = tech.lastSeen ? new Date(tech.lastSeen).toLocaleString() : 'Unknown';
        return `
          <div class="tech-card">
            <div class="tech-avatar">🔧</div>
            <div class="tech-info">
              <div class="tech-name">${tech.name || 'Technician'}</div>
              <div class="tech-phone">📞 ${tech.phone || '—'}</div>
              <div style="font-size:11px;color:var(--gray);">📍 Last seen: ${lastSeen}</div>
            </div>
            <span class="tech-status online">🟢 Online</span>
          </div>
        `;
      }).join('');
    }

    // ── Render All Techs ──────────────────────────────────────────────
    function renderAllTechs() {
      const container = document.getElementById('allTechs');
      document.getElementById('techCount').textContent = `${allTechs.length} registered technicians`;

      if (allTechs.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="padding:20px;">
            <div class="icon">🔧</div>
            <h3>No Technicians Registered</h3>
            <p>Technicians will appear here once they register through the mobile app.</p>
          </div>
        `;
        return;
      }

      // Calculate order counts per tech
      const orderCounts = {};
      allOrders.forEach(o => {
        if (o.techPhone) {
          orderCounts[o.techPhone] = (orderCounts[o.techPhone] || 0) + 1;
        }
      });

      const isOnline = (phone) => onlineTechs.some(t => t.phone === phone);

      container.innerHTML = allTechs.map(tech => {
        const online = isOnline(tech.phone);
        const count = orderCounts[tech.phone] || 0;
        return `
          <div class="tech-card" onclick="showTechDetail('${tech.phone}')" style="cursor:pointer;">
            <div class="tech-avatar">🔧</div>
            <div class="tech-info">
              <div class="tech-name">${tech.name || 'Technician'}</div>
              <div class="tech-phone">📞 ${tech.phone || '—'}</div>
              ${tech.location ? `<div class="tech-phone">📍 ${tech.location}</div>` : ''}
              <div style="font-size:11px;color:var(--gray);margin-top:2px;">📋 ${count} orders completed</div>
            </div>
            <div style="text-align:right;">
              <span class="tech-status ${online ? 'online' : 'offline'}">${online ? '🟢 Online' : '🔴 Offline'}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    window.filterTechs = function() {
      const search = document.getElementById('searchTech').value.toLowerCase().trim();
      const cards = document.querySelectorAll('#allTechs .tech-card');
      cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(search) ? 'flex' : 'none';
      });
    };

    window.showTechDetail = function(phone) {
      const tech = allTechs.find(t => t.phone === phone);
      if (!tech) return;

      const modal = document.getElementById('techDetailModal');
      const techOrders = allOrders.filter(o => o.techPhone === phone);
      const acceptedOrders = techOrders.filter(o => o.status === 'completed').length;

      document.getElementById('techDetailBody').innerHTML = `
        <div style="text-align:center;margin-bottom:16px;">
          <div style="font-size:40px;margin-bottom:8px;">🔧</div>
          <div style="font-size:18px;font-weight:800;color:var(--navy);">${tech.name || 'Technician'}</div>
        </div>
        <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${tech.phone || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${tech.location || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Source</span><span class="detail-value">${tech.source || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Total Orders</span><span class="detail-value">${techOrders.length}</span></div>
        <div class="detail-row"><span class="detail-label">Completed</span><span class="detail-value">${acceptedOrders}</span></div>
        ${tech.pushToken ? `<div class="detail-row"><span class="detail-label">Push Token</span><span class="detail-value" style="font-size:10px;">${tech.pushToken.substring(0, 30)}...</span></div>` : ''}
        <div style="margin-top:16px;">
          <a href="orders.html?search=${tech.phone}" class="btn btn-primary btn-sm btn-block">📋 View ${tech.name}'s Orders</a>
        </div>
      `;

      modal.classList.add('show');
    };

    // Close modal on overlay click
    document.getElementById('techDetailModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });

  </script>
</body>
</html>
