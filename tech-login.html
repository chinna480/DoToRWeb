<!DOCTYPE html>
<html>
<head>
  <title>DoToR - Technician Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./logo.jpeg" type="image/x-icon">
</head>
<body>

  <div class="login-container" style="padding-bottom:40px">

    <a href="role.html" class="back-btn">←</a>

    <div class="login-header">
      <div class="login-icon">🔧</div>
      <h2 class="login-title">Technician Login</h2>
      <p class="login-sub">Join DoToR and start earning!</p>
    </div>

    <div class="login-form">

      <div class="input-group">
        <label class="input-label">Full Name</label>
        <div class="input-field">
          <span>👤</span>
          <input type="text" id="techName" placeholder="Enter your full name">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Phone Number</label>
        <div class="input-field">
          <span class="flag">🇮🇳 +91</span>
          <input type="number" id="techPhone" placeholder="Enter 10 digit number">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Location</label>
        <div class="input-field">
          <span>📍</span>
          <input type="text" id="techLocation" placeholder="Enter your area">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Experience</label>
        <div class="input-field">
          <span>⭐</span>
          <select id="techExp" class="select-box">
            <option value="">Select Experience</option>
            <option>0 - 1 Year</option>
            <option>1 - 2 Years</option>
            <option>2 - 5 Years</option>
            <option>5+ Years</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Skills</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox"> 📱 Phone Repair
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 💻 Laptop Repair
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 🍎 iPhone Repair
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 🖥️ Screen Replacement
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 🔋 Battery Replacement
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 💾 Software Issues
          </label>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Upload Certificate</label>
        <div class="upload-box" onclick="document.getElementById('certFile').click()">
          <div class="upload-icon">📄</div>
          <p class="upload-text" id="certText">Click to upload Certificate</p>
          <p class="upload-sub">PDF, JPG, PNG accepted</p>
          <input type="file" id="certFile" accept=".pdf,.jpg,.png"
            style="display:none"
            onchange="fileSelected('certFile','certText')">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Upload Aadhar Card</label>
        <div class="upload-box" onclick="document.getElementById('aadharFile').click()">
          <div class="upload-icon">🪪</div>
          <p class="upload-text" id="aadharText">Click to upload Aadhar Card</p>
          <p class="upload-sub">JPG, PNG accepted</p>
          <input type="file" id="aadharFile" accept=".jpg,.png"
            style="display:none"
            onchange="fileSelected('aadharFile','aadharText')">
        </div>
      </div>

      <button class="blue-btn" onclick="techRegister()">
        Register & Continue →
      </button>

      <p class="switch-role">
        Need Repair?
        <a href="customer-login.html">Customer Login</a>
      </p>

    </div>
  </div>

  <script>
    function fileSelected(inputId, textId) {
      const file = document.getElementById(inputId).files[0]
      document.getElementById(textId).textContent = '✅ ' + file.name
    }

    function techRegister() {
      const name     = document.getElementById('techName').value.trim()
      const phone    = document.getElementById('techPhone').value.trim()
      const location = document.getElementById('techLocation').value.trim()
      const exp      = document.getElementById('techExp').value

      if (!name)               { alert('Enter your name!');     return }
      if (phone.length !== 10) { alert('Enter valid phone!');   return }
      if (!location)           { alert('Enter your location!'); return }
      if (!exp)                { alert('Select experience!');   return }

      // Save all tech info including phone for call feature
      localStorage.setItem('techName',     name)
      localStorage.setItem('techPhone',    phone)
      localStorage.setItem('techLocation', location)
      localStorage.setItem('techExp',      exp)

      window.location.href = 'tech-home.html'
    }
  </script>

</body>
</html>
