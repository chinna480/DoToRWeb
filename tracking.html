<!DOCTYPE html>
<html>
<head>
  <title>DoToR - Live Tracking</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./logo.jpeg" type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f5f5f5; font-family:Arial,sans-serif; }
    #map { width:100%; height:300px; }

    .track-header {
      background:#FF6B00;
      padding:20px;
      color:white;
    }
    .track-title { font-size:18px; font-weight:800; }
    .track-sub   { font-size:12px; opacity:0.8; margin-top:3px; }

    .track-content { padding:15px; }

    .info-card {
      background:white;
      border-radius:16px;
      padding:18px;
      margin-bottom:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .info-title {
      font-size:11px; font-weight:800;
      color:#888; text-transform:uppercase;
      letter-spacing:1px; margin-bottom:10px;
    }
    .info-row {
      display:flex; justify-content:space-between;
      padding:7px 0; border-bottom:1px solid #f5f5f5; font-size:13px;
    }
    .info-row:last-child { border:none; }
    .info-label { color:#888; font-weight:600; }
    .info-value { color:#1A3A6B; font-weight:800; }

    .status-steps { display:flex; flex-direction:column; gap:12px; }
    .step { display:flex; align-items:center; gap:12px; }
    .dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .dot.done    { background:#FF6B00; }
    .dot.active  { background:#1A3A6B; animation: pulse 1.2s infinite; }
    .dot.pending { background:#ddd; }
    @keyframes pulse {
      0%,100% { transform:scale(1); opacity:1; }
      50%      { transform:scale(1.3); opacity:0.7; }
    }
    .step-label { font-size:13px; font-weight:700; color:#1A3A6B; }

    .tech-row { display:flex; align-items:center; gap:12px; }
    .tech-avatar {
      width:48px; height:48px; background:#1A3A6B;
      border-radius:50%; display:flex;
      align-items:center; justify-content:center;
      font-size:22px; flex-shrink:0;
    }
    .tech-name { font-size:15px; font-weight:800; color:#1A3A6B; }
    .tech-sub  { font-size:12px; color:#888; margin-top:2px; }
    .rating {
      margin-left:auto; background:#fff5ee;
      color:#FF6B00; font-size:12px; font-weight:800;
      padding:4px 10px; border-radius:20px; white-space:nowrap;
    }

    .call-btn {
      width:100%; padding:16px;
      background:#1A3A6B; color:white;
      font-size:16px; font-weight:800;
      border:none; border-radius:14px;
      cursor:pointer; margin-top:5px;
      display:flex; align-items:center;
      justify-content:center; gap:8px;
      text-decoration:none;
    }
    .call-btn.disabled { background:#aaa; cursor:not-allowed; }
  </style>
</head>
<body>

  <div class="track-header">
    <div class="track-title">🛵 Live Tracking</div>
    <div class="track-sub" id="trackStatus">⏳ Waiting for technician to accept...</div>
  </div>

  <div id="map"></div>

  <div class="track-content">

    <!-- TECHNICIAN INFO -->
    <div class="info-card">
      <div class="info-title">Your Technician</div>
      <div class="tech-row">
        <div class="tech-avatar">👨‍🔧</div>
        <div>
          <div class="tech-name" id="techNameDisplay">Finding technician...</div>
          <div class="tech-sub"  id="techSubDisplay">Will update on accept</div>
        </div>
        <div class="rating">⭐ 4.8</div>
      </div>
    </div>

    <!-- ORDER INFO -->
    <div class="info-card">
      <div class="info-title">Order Details</div>
      <div class="info-row">
        <span class="info-label">Device</span>
        <span class="info-value" id="trackBrand">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Repair</span>
        <span class="info-value" id="trackRepair">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Location</span>
        <span class="info-value" id="trackLocation">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">ETA</span>
        <span class="info-value">~30 mins</span>
      </div>
    </div>

    <!-- STATUS STEPS -->
    <div class="info-card">
      <div class="info-title">Live Status</div>
      <div class="status-steps">
        <div class="step">
          <div class="dot done"></div>
          <div class="step-label">✅ Order Confirmed</div>
        </div>
        <div class="step">
          <div class="dot pending" id="dot-onway"></div>
          <div class="step-label">🚗 Technician On The Way</div>
        </div>
        <div class="step">
          <div class="dot pending" id="dot-repair"></div>
          <div class="step-label">🔧 Repair In Progress</div>
        </div>
        <div class="step">
          <div class="dot pending" id="dot-done"></div>
          <div class="step-label">✅ Repair Done!</div>
        </div>
      </div>
    </div>

    <a id="callBtn" class="call-btn disabled" href="#" onclick="return handleCall(event)">
      📞 Call Technician
    </a>

  </div>

<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDS0hDsfqwMiMg5S9Ztp8eku83XerVtbdY",
    authDomain:        "dotor-2e4d8.firebaseapp.com",
    databaseURL:       "https://dotor-2e4d8-default-rtdb.firebaseio.com",
    projectId:         "dotor-2e4d8",
    storageBucket:     "dotor-2e4d8.firebasestorage.app",
    messagingSenderId: "984437487718",
    appId:             "1:984437487718:web:3d279fdf6e720f119915a7"
  }

  const app = initializeApp(firebaseConfig)
  const db  = getDatabase(app)

  // ── Order details from localStorage ──────────────────────────────────────
  document.getElementById('trackBrand').textContent    = localStorage.getItem('lastBrand')    || '-'
  document.getElementById('trackRepair').textContent   = localStorage.getItem('lastRepair')   || '-'
  document.getElementById('trackLocation').textContent = localStorage.getItem('custLocation') || '-'

  // ── Initialise Leaflet map ────────────────────────────────────────────────
  const map = L.map('map').setView([17.3850, 78.4867], 14)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map)

  const custIcon = L.divIcon({ html:'<div style="font-size:30px;line-height:1">🏠</div>', className:'', iconSize:[30,30], iconAnchor:[15,30] })
  const techIcon = L.divIcon({ html:'<div style="font-size:30px;line-height:1">🛵</div>', className:'', iconSize:[30,30], iconAnchor:[15,30] })

  let custMarker = null
  let techMarker = null

  // ── CUSTOMER pushes their live GPS to Firebase so TECHNICIAN can track ───
  //    Also places the 🏠 marker on their own map
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      pos => {
        const lat = pos.coords.latitude
        const lng = pos.coords.longitude

        // Push customer GPS to Firebase → technician's map reads this
        set(ref(db, 'custLocation'), { lat, lng })

        // Place / move customer marker on their own map
        if (custMarker) {
          custMarker.setLatLng([lat, lng])
        } else {
          custMarker = L.marker([lat, lng], { icon: custIcon })
            .addTo(map)
            .bindPopup('📍 Your Location')
            .openPopup()
          map.setView([lat, lng], 15)
        }
      },
      () => {
        // Geolocation denied — use stored area as fallback
        const fallbackLat = 17.3850, fallbackLng = 78.4867
        set(ref(db, 'custLocation'), { lat: fallbackLat, lng: fallbackLng })
        if (!custMarker) {
          custMarker = L.marker([fallbackLat, fallbackLng], { icon: custIcon })
            .addTo(map)
            .bindPopup('📍 Your Location (approx)')
            .openPopup()
        }
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    )
  }

  // ── TECHNICIAN live location → shows 🛵 on customer's map ────────────────
  onValue(ref(db, 'techLocation'), snap => {
    if (snap.exists()) {
      const { lat, lng } = snap.val()
      if (techMarker) {
        techMarker.setLatLng([lat, lng])
      } else {
        techMarker = L.marker([lat, lng], { icon: techIcon })
          .addTo(map)
          .bindPopup('🛵 Technician Coming!')
          .openPopup()
      }
      document.getElementById('trackStatus').textContent  = '🛵 Technician is on the way!'
      document.getElementById('dot-onway').className      = 'dot active'
    } else {
      document.getElementById('trackStatus').textContent  = '⏳ Waiting for technician to accept...'
      document.getElementById('dot-onway').className      = 'dot pending'
    }
  })

  // ── Technician INFO (name + phone) → shown to customer ───────────────────
  onValue(ref(db, 'techInfo'), snap => {
    const btn = document.getElementById('callBtn')
    if (snap.exists()) {
      const { name = 'Technician', location = '', phone = '' } = snap.val()
      document.getElementById('techNameDisplay').textContent = name
      document.getElementById('techSubDisplay').textContent  = location ? '📍 ' + location : 'Expert Technician'

      if (phone) {
        btn.href      = 'tel:+91' + phone
        btn.innerHTML = '📞 Call ' + name
        btn.classList.remove('disabled')
      } else {
        btn.href      = '#'
        btn.innerHTML = '📞 Call Technician'
        btn.classList.add('disabled')
      }
    } else {
      document.getElementById('techNameDisplay').textContent = 'Waiting for technician...'
      document.getElementById('techSubDisplay').textContent  = 'Will update on accept'
      btn.href      = '#'
      btn.innerHTML = '📞 Call Technician'
      btn.classList.add('disabled')
    }
  })

  window.handleCall = function(e) {
    if (document.getElementById('callBtn').classList.contains('disabled')) {
      alert('Technician not assigned yet. Please wait!')
      e.preventDefault()
      return false
    }
    return true
  }
</script>

</body>
</html>
