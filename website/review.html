<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rate Experience - DoToR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DoToR">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
</head>
<body>
<div class="app-container">

  <!-- REVIEW SCREEN -->
  <div id="screen-review" class="screen active">
    <div class="top-header navy">
      <button class="back-btn" onclick="history.back()">←</button>
      <span class="title">⭐ Rate Your Experience</span>
      <span class="spacer"></span>
    </div>
    <div class="review-container">
      <div class="info-card" style="text-align:center;">
        <div class="review-emoji" id="reviewEmoji">😐</div>
        <div class="review-label-text" id="reviewLabel">Tap to rate your experience</div>
        <div class="review-stars" id="reviewStars"></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;font-weight:600;max-width:280px;margin:0 auto 16px;">
          <span>Poor</span><span>Fair</span><span>Good</span><span>Great</span><span>Excellent</span>
        </div>
        <div class="input-card">
          <label>Write a comment (optional)</label>
          <textarea id="reviewComment" placeholder="Tell us about your experience..." style="min-height:80px;width:100%;border:2px solid #eee;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;" oninput="this.value.length > 2000 && (this.value=this.value.slice(0,2000));document.getElementById('reviewCharCount').textContent=this.value.length"></textarea>
          <div class="char-count"><span id="reviewCharCount">0</span>/2000</div>
        </div>
        <button class="btn-primary" onclick="submitRvw()" id="submitReviewBtn" disabled>⭐ Submit Review</button>
      </div>
    </div>
    <div class="tab-bottom-pad"></div>
  </div>

</div>

<script src="utils.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.initDarkMode)window.initDarkMode();});</script>
<script src="auth.js"></script>

<script type="module">
  import { submitTechReview, listenOrder, updateOrderStatus } from './firebase.js?v=2';

  // ── Auth ─────────────────────────────────────────────
  var custName  = localStorage.getItem('custName') || '';
  var custPhone = localStorage.getItem('custPhone') || '';
  if (!custName && !custPhone) { window.location.href = 'index.html'; }

  var urlParams = new URLSearchParams(window.location.search);
  var orderId    = urlParams.get('orderId') || '';
  var techPhone  = urlParams.get('techPhone') || '';
  var techName   = urlParams.get('techName') || 'Technician';

  var rating = 0;

  // ── Render stars ────────────────────────────────────
  function renderStars() {
    var starsHtml = '';
    for (var i = 1; i <= 5; i++) {
      var active = i <= rating ? 'active' : '';
      starsHtml += '<button class="star-btn ' + active + '" onclick="setRating(' + i + ')">★</button>';
    }
    document.getElementById('reviewStars').innerHTML = starsHtml;

    var emojis = ['😤', '😞', '😐', '😊', '🤩'];
    var labels = ['Poor', 'Fair', 'Good', 'Great', 'Excellent'];
    document.getElementById('reviewEmoji').textContent = rating > 0 ? emojis[rating - 1] : '😐';
    document.getElementById('reviewLabel').textContent = rating > 0 ? labels[rating - 1] : 'Tap to rate your experience';
    document.getElementById('submitReviewBtn').disabled = rating === 0;
  }

  window.setRating = function(r) {
    rating = r;
    renderStars();
  };

  // ── Submit review ────────────────────────────────────
  window.submitRvw = async function() {
    if (rating === 0) { window.showToast('Please select a rating!', 'error'); return; }
    var comment = document.getElementById('reviewComment').value.trim();
    var btn = document.getElementById('submitReviewBtn');
    btn.disabled = true; btn.innerHTML = '⏳ Submitting...';

    try {
      await submitTechReview(techPhone, techName, custName, rating, comment, orderId, custPhone);
      window.showToast('✅ Review submitted! Thank you!', 'success');
      setTimeout(function() { window.location.href = 'orders.html'; }, 1500);
    } catch(e) {
      window.showToast('❌ Failed to submit review', 'error');
      btn.disabled = false; btn.innerHTML = '⭐ Submit Review';
    }
  };

  renderStars();
</script>

<script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(e) { console.log('SW reg failed:', e); }); }</script>
</body>
</html>
