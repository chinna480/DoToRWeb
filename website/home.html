<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Home - DoToR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DoToR">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
</head>
<body>
<div class="app-container">

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- HOME TAB -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div>
        <div class="home-greeting" id="homeGreeting">Loading...</div>
        <div class="home-name" id="homeName">Customer</div>
        <div class="home-loc" id="homeLoc">📍 Your Location</div>
      </div>
      <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()" style="margin-right:10px;">🌙</button><div class="home-avatar" onclick="window.location.href='profile.html'">👤</div>
    </div>

    <div class="banner" onclick="window.location.href='booking.html'">
      <div>
        <div class="banner-text">🔧 Expert Repair at Your Doorstep!</div>
        <div class="banner-sub">Book in 30 seconds!</div>
      </div>
      <div class="banner-cta">🔧 Book Now</div>
    </div>

    <div class="quick-strip" id="quickStrip"></div>
    <div class="section-title">⭐ Why DoToR?</div>
    <div id="whySection"></div>
    <div class="tab-bottom-pad"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- BOTTOM TAB BAR -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div class="tab-bar">
    <button class="tab-item active" onclick="navigateTo('home.html')">
      <span class="tab-icon active">🏠</span>
      <span class="tab-label active">Home</span>
      <div class="tab-indicator"></div>
    </button>
    <button class="tab-item" onclick="window.location.href='booking.html'">
      <span class="tab-icon">🔧</span>
      <span class="tab-label">Repair</span>
    </button>
    <button class="tab-item" onclick="navigateTo('orders.html')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Orders</span>
    </button>
    <button class="tab-item" onclick="navigateTo('profile.html')">
      <span class="tab-icon">👤</span>
      <span class="tab-label">Profile</span>
    </button>
  </div>

  <!-- ── Floating Download App Button ───────────────── -->
  <a href="https://github.com/chinna480/DoToRApp/releases/latest/download/DoToR.apk" class="float-download" target="_blank" download>
    <span class="fd-icon">📲</span>
    <div>
      <div class="fd-text">Download App</div>
      <div class="fd-sub">Free Android APK</div>
    </div>
  </a>

</div><!-- /app-container -->

<script src="utils.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.initDarkMode)window.initDarkMode();});</script>
<script src="auth.js"></script>
<script>
// ── Navigate with params ──────────────────────────────
window.navigateTo = function(page) {
  var params = new URLSearchParams();
  if (window._custPhone) params.set('phone', window._custPhone);
  if (window._custName)  params.set('name', window._custName);
  var qs = params.toString();
  window.location.href = page + (qs ? '?' + qs : '');
};

document.addEventListener('DOMContentLoaded', function() {
  // Require auth
  window.syncAuth();
  if (!window.requireAuth()) return;

  // Update greeting
  var hour = new Date().getHours();
  var greeting = hour < 12 ? 'Good Morning! 👋' : hour < 17 ? 'Good Afternoon! 👋' : 'Good Evening! 👋';
  var name = window._custName || 'Customer';
  var loc = window._custLocation || 'Your Location';

  document.getElementById('homeGreeting').textContent = greeting;
  document.getElementById('homeName').textContent = name;
  document.getElementById('homeLoc').textContent = '📍 ' + loc;

  // Render quick strip with links to booking page
  var strip = document.getElementById('quickStrip');
  var services = [
    { key:'mobile', icon:'📱', label:'Mobile' },
    { key:'laptop', icon:'💻', label:'Laptop' },
    { key:'tv', icon:'📺', label:'TV' },
    { key:'ac', icon:'❄️', label:'AC' },
    { key:'refrigerator', icon:'🧊', label:'Fridge' },
    { key:'washing', icon:'🧺', label:'Washing' },
  ];
  strip.innerHTML = services.map(function(svc) {
    return '<div class="quick-item" onclick="window.location.href=\'booking.html?service=' + svc.key + '\'">' +
      '<div class="quick-item-icon">' + svc.icon + '</div>' +
      '<div class="quick-item-label">' + svc.label + '</div>' +
      '</div>';
  }).join('');

  // Render why section
  var whyItems = [
    { icon:'🏠', title:'Doorstep Service', desc:'Technician comes to your home!' },
    { icon:'👀', title:'Repair in Front of You', desc:'100% transparent process!' },
    { icon:'⚡', title:'Fast Service', desc:'Arrives within 60 mins!' },
    { icon:'💰', title:'Best Price', desc:'No hidden charges ever!' },
  ];
  document.getElementById('whySection').innerHTML =
    whyItems.map(function(item) {
      return '<div class="why-item"><div class="why-icon">' + item.icon + '</div><div><div class="why-title">' + item.title + '</div><div class="why-desc">' + item.desc + '</div></div></div>';
    }).join('') +
    '<div class="home-download-section">' +
    '<div class="hds-header"><div class="hds-icon">📲</div><div><div class="hds-title">Get the DoToR App</div><div class="hds-sub">Faster booking, live tracking, and more!</div></div></div>' +
    '<div class="hds-features">' +
    '<div class="hds-feat"><span class="feat-icon">⚡</span> One-tap repair booking</div>' +
    '<div class="hds-feat"><span class="feat-icon">📍</span> Live technician tracking</div>' +
    '<div class="hds-feat"><span class="feat-icon">💬</span> In-app chat with tech</div>' +
    '<div class="hds-feat"><span class="feat-icon">🔔</span> Push notifications</div>' +
    '</div>' +
    '<a href="https://github.com/chinna480/DoToRApp/releases/latest/download/DoToR.apk" class="hds-btn" target="_blank" download>' +
    '<span class="btn-icon">📲</span><div><div>Download Android App</div><div class="btn-sub">Free APK • 5MB</div></div></a></div>';
});
</script>

<script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(e) { console.log('SW reg failed:', e); }); }</script>
</body>
</html>
