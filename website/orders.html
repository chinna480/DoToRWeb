<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Orders - DoToR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DoToR">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
</head>
<body>
<div class="app-container">

  <!-- ORDERS TAB -->
  <div id="screen-orders" class="screen active">
    <div class="home-header">
      <div>
        <div class="home-greeting">📋</div>
        <div class="home-name">My Orders</div>
        <div class="home-loc" id="ordersCount">Loading...</div>
      </div>
    </div>
    <div class="filter-row" id="ordersFilterRow"></div>
    <div id="ordersList"></div>
    <div id="ordersEmpty" class="empty-state" style="display:none;">
      <div class="icon">📦</div>
      <h3>No orders found</h3>
      <p>Book your first repair and it will appear here!</p>
      <button class="btn-primary" style="margin-top:16px;max-width:200px;margin-left:auto;margin-right:auto;" onclick="window.location.href='booking.html'">🔧 Book Repair</button>
    </div>
    <div class="tab-bottom-pad"></div>
  </div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button class="tab-item" onclick="window.location.href='home.html'">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item" onclick="window.location.href='booking.html'">
      <span class="tab-icon">🔧</span>
      <span class="tab-label">Repair</span>
    </button>
    <button class="tab-item active" onclick="window.location.href='orders.html'">
      <span class="tab-icon active">📋</span>
      <span class="tab-label active">Orders</span>
      <div class="tab-indicator"></div>
    </button>
    <button class="tab-item" onclick="window.location.href='profile.html'">
      <span class="tab-icon">👤</span>
      <span class="tab-label">Profile</span>
    </button>
  </div>

</div>

<script type="module">
  import { listenCustomerOrders, listenOrder, SERVICE_CATEGORIES, getServicePriceEstimate } from './firebase.js?v=2';

  // ── Get auth from localStorage ─────────────────────
  const custPhone = localStorage.getItem('custPhone') || '';
  const custName  = localStorage.getItem('custName') || '';

  if (!custPhone || !custName) {
    window.location.href = 'index.html';
  }

  let allOrders = [];
  let currentFilter = 'all';

  // ── Render filter tabs ─────────────────────────────
  function renderFilters() {
    const filters = [
      { key:'all', label:'All' },
      { key:'pending', label:'Pending' },
      { key:'accepted', label:'Active' },
      { key:'completed', label:'Completed' },
    ];
    document.getElementById('ordersFilterRow').innerHTML = filters.map(function(f) {
      var cls = f.key === currentFilter ? 'filter-tab active' : 'filter-tab';
      return '<button class="' + cls + '" onclick="changeFilter(\'' + f.key + '\')">' + f.label + '</button>';
    }).join('');
  }

  window.changeFilter = function(key) {
    currentFilter = key;
    renderFilters();
    renderOrders();
  };

  // ── Render orders ─────────────────────────────────
  function renderOrders() {
    var list = document.getElementById('ordersList');
    var empty = document.getElementById('ordersEmpty');

    var filtered = currentFilter === 'all'
      ? allOrders
      : allOrders.filter(function(o) { return o.status === currentFilter; });

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    document.getElementById('ordersCount').textContent = filtered.length + ' order(s)';

    list.innerHTML = filtered.map(function(order) {
      var svc = SERVICE_CATEGORIES.find(function(s) { return s.key === order.serviceCategory; });
      var label = order.serviceLabel || (svc ? svc.label : 'Repair') || 'Service';

      var statusClass = order.status === 'completed' ? 'completed' : order.status === 'accepted' ? 'accepted' : 'pending';

      var actionsHtml = '';
      if (order.status === 'accepted' || order.status === 'pending') {
        actionsHtml += '<button class="btn-primary btn-sm" style="margin-top:6px;width:100%;padding:6px 10px;font-size:11px;" onclick="window.location.href=\'tracking.html?orderId=' + order.id + '\'">🛵 Track</button>';
      }
      if (order.status === 'completed' && order.techName && !order.reviewed) {
        actionsHtml += '<button class="btn-green btn-sm" style="margin-top:6px;width:100%;padding:6px 10px;font-size:11px;" onclick="window.location.href=\'review.html?orderId=' + order.id + '&techPhone=' + encodeURIComponent(order.techPhone || '') + '&techName=' + encodeURIComponent(order.techName || '') + '\'">⭐ Rate</button>';
      }
      if (order.techName) {
        actionsHtml += '<button class="btn-outline btn-sm" style="margin-top:4px;width:100%;padding:6px 10px;font-size:11px;" onclick="window.location.href=\'chat.html?orderId=' + order.id + '&techName=' + encodeURIComponent(order.techName || 'Technician') + '\'">💬 Chat</button>';
      }
      // Invoice download button for completed orders
      if (order.status === 'completed') {
        actionsHtml += '<button class="btn-navy btn-sm" style="margin-top:4px;width:100%;padding:6px 10px;font-size:11px;" onclick="downloadInvoice(\'' + order.id + '\')">📄 Invoice</button>';
      }

      var imagesHtml = '';
      if (order.images && order.images.length > 0) {
        imagesHtml = '<div style="display:flex;gap:4px;margin-top:4px;">' +
          order.images.slice(0, 3).map(function(img) {
            return '<img src="' + img + '" style="width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;" onclick="window.open(\'' + img + '\',\'_blank\')">';
          }).join('') +
          (order.images.length > 3 ? '<span style="font-size:10px;color:#888;align-self:center;">+' + (order.images.length - 3) + '</span>' : '') +
          '</div>';
      }

      var techInfoHtml = '';
      if (order.techName) {
        techInfoHtml = '<div class="order-tech-section">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:#1A3A6B;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:16px;">' +
          (order.techPhoto ? '<img src="' + order.techPhoto + '" style="width:100%;height:100%;object-fit:cover;" alt="tech">' : '👨‍🔧') +
          '</div>' +
          '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;font-weight:800;color:#1A3A6B;">🔧 ' + order.techName + '</div>' +
          (order.techArea ? '<div style="font-size:11px;color:#888;font-weight:600;">📍 ' + order.techArea + '</div>' : '') +
          (order.techExp ? '<div style="font-size:11px;color:#FF6B00;font-weight:700;">⭐ ' + order.techExp + ' experience</div>' : '') +
          '</div></div></div>';
      }

      return '<div class="order-card ' + statusClass + '">' +
        '<div class="order-left">' +
        '<div class="order-device">' + (order.brand ? order.brand + ' ' : '') + (order.modelName || order.device || label) + '</div>' +
        '<div class="order-repair">' + label + '</div>' +
        '<div class="order-detail-text">📍 ' + (order.location || '—') + '</div>' +
        '<div class="order-detail-text">🕐 ' + new Date(order.createdAt || Date.now()).toLocaleDateString() + '</div>' +
        imagesHtml +
        techInfoHtml +
        '</div>' +
        '<div class="order-right">' +
        '<span class="order-status-badge ' + order.status + '">' + order.status + '</span>' +
        actionsHtml +
        '</div>' +
        '</div>';
    }).join('');
  }

  // ── Listen for orders ──────────────────────────────
  var unsubOrders = listenCustomerOrders(custPhone, function(orders) {
    allOrders = orders;
    renderOrders();
  });

  // ── Invoice download ───────────────────────────────
  window.downloadInvoice = function(orderId) {
    var order = allOrders.find(function(o) { return o.id === orderId; });
    if (!order) { window.showToast('Order not found', 'error'); return; }
    var invoiceHtml = window.generateInvoiceHtml(order);
    var win = window.open('', '_blank');
    if (win) {
      win.document.write('<html><head><title>DoToR Invoice</title><style>body{font-family:sans-serif;padding:20px;background:#f5f5f5;}@media print{body{padding:0;background:#fff;}}</style></head><body>');
      win.document.write(invoiceHtml);
      win.document.write('<div style="text-align:center;margin-top:20px;"><button onclick="window.print()" style="background:#FF6B00;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;">🖨️ Print / Save PDF</button></div>');
      win.document.write('</body></html>');
      win.document.close();
    }
  };

  renderFilters();
</script>

<script src="utils.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.initDarkMode)window.initDarkMode();});</script>
<script src="auth.js"></script>

<script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(e) { console.log('SW reg failed:', e); }); }</script>
</body>
</html>
