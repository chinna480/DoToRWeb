<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat - DoToR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DoToR">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
</head>
<body>
<div class="app-container">

  <!-- CHAT SCREEN -->
  <div id="screen-chat" class="screen active">
    <div class="top-header" style="background:#1A3A6B;">
      <button class="back-btn" onclick="goBack()">←</button>
      <span class="title" id="chatPartnerName">💬 Technician</span>
      <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()">🌙</button><span class="spacer"></span>
    </div>
    <div class="chat-container">
      <div class="chat-msgs" id="chatMessages">
        <div class="empty-state" style="padding:60px 20px;">
          <div class="icon">💬</div>
          <h3>No messages yet</h3>
          <p>Send a message to start chatting!</p>
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()" maxlength="500">
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

</div>

<script src="utils.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.initDarkMode)window.initDarkMode();});</script>
<script src="auth.js"></script>

<script type="module">
  import { sendMessage, listenMessages, markChatRead } from './firebase.js?v=2';

  // ── Auth ─────────────────────────────────────────────
  var custPhone = localStorage.getItem('custPhone') || '';
  var custName  = localStorage.getItem('custName') || '';
  if (!custPhone || !custName) { window.location.href = 'index.html'; }

  var urlParams = new URLSearchParams(window.location.search);
  var orderId = urlParams.get('orderId') || '';
  var techName = urlParams.get('techName') || 'Technician';

  if (!orderId) { window.showToast('No order specified', 'error'); window.location.href = 'orders.html'; }

  document.getElementById('chatPartnerName').textContent = '💬 ' + techName;

  window.goBack = function() { history.back(); };

  // ── Listen for messages with read receipts ────────
  var unsub = listenMessages(orderId, function(messages) {
    var container = document.getElementById('chatMessages');
    if (messages.length === 0) {
      container.innerHTML = '<div class="empty-state" style="padding:60px 20px;"><div class="icon">💬</div><h3>No messages yet</h3><p>Send a message to start chatting!</p></div>';
      return;
    }
    container.innerHTML = messages.map(function(msg) {
      var isSent = msg.senderRole === 'customer' || msg.sender === custName || msg.sender === custPhone;
      var cls = isSent ? 'chat-bubble sent' : 'chat-bubble received';
      var time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
      var readReceipt = '';
      if (isSent) {
        if (msg.read) {
          readReceipt = '<span style="font-size:10px;color:rgba(255,255,255,0.7);margin-left:4px;">✓✓</span>';
        } else {
          readReceipt = '<span style="font-size:10px;color:rgba(255,255,255,0.4);margin-left:4px;">✓</span>';
        }
      }
      return '<div class="' + cls + '">' +
        '<div>' + (msg.text || msg.message || '') + '</div>' +
        '<div class="chat-time">' + time + readReceipt + '</div>' +
        '</div>';
    }).join('');
    container.scrollTop = container.scrollHeight;

    // Mark messages as read (customer side)
    markChatRead(orderId, 'customer').catch(function(e) {});
  });

  // ── Send message ────────────────────────────────────
  window.sendMsg = function() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendMessage(orderId, {
      text: text,
      sender: custName,
      senderRole: 'customer',
      senderPhone: custPhone,
    }).catch(function(e) {
      window.showToast('❌ Failed to send', 'error');
    });
  };
</script>

<script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(e) { console.log('SW reg failed:', e); }); }</script>
</body>
</html>
