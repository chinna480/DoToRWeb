<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Book Repair - DoToR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">
  <!-- Leaflet CSS for map picker -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DoToR">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
</head>
<body>
<div class="app-container">

  <!-- ── REPAIR WIZARD ──────────────────────────────── -->
  <div id="screen-repair" class="screen active">
    <div class="wizard-header">
      <button class="wizard-back" id="wizardBackBtn" onclick="wizardBack()">← Cancel</button>
      <span class="wizard-title">Book Repair</span>
      <button class="wizard-close" onclick="window.location.href='home.html'">✕</button>
    </div>
    <div class="progress-container">
      <div class="progress-scroll" id="progressScroll"></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:12.5%"></div></div>
    </div>
    <div id="wizardBody" style="min-height: 60vh;"></div>
    <div class="wizard-bottom">
      <button class="btn-primary" id="wizardNextBtn" onclick="wizardNext()">Continue →</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- MODALS -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="mapPickerOverlay" onclick="if(event.target===this)closeMapPicker()">
    <div class="modal-content">
      <div class="modal-header"><h3>📍 Select Repair Location</h3><button class="modal-close" onclick="closeMapPicker()">✕</button></div>
      <div style="display:flex;gap:8px;padding:10px 18px;border-bottom:1px solid #eee;">
        <div style="flex:1;position:relative;">
          <input type="text" id="mapSearchInput" placeholder="Search location..." style="padding:8px 12px;font-size:13px;width:100%;border:2px solid #eee;border-radius:10px;outline:none;font-family:inherit;" oninput="debouncedMapSearch(this.value)" autocomplete="off">
          <div class="loc-suggestions" id="mapSearchSuggestions"></div>
        </div>
      </div>
      <div id="mapPickerContainer" style="flex:1;min-height:300px;"></div>
      <div class="modal-bottom">
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <button class="btn-outline" style="flex:1;padding:8px;font-size:11px;" onclick="switchMapLayer('standard')">🗺️ Map</button>
          <button class="btn-outline" style="flex:1;padding:8px;font-size:11px;" onclick="switchMapLayer('satellite')">🛰️ Satellite</button>
          <button class="btn-outline" style="flex:1;padding:8px;font-size:11px;" onclick="mapPickerGoMyLocation()">📍 My Location</button>
        </div>
        <p id="mapPickerCoords" style="font-size:12px;color:#888;font-weight:600;text-align:center;margin-bottom:6px;">📍 Tap on the map to drop a pin</p>
        <button class="btn-primary" onclick="confirmMapPick()" id="confirmMapBtn" disabled>✅ Confirm Location</button>
      </div>
    </div>
  </div>

  <!-- Full-screen Image Viewer -->
  <div class="fs-overlay" id="fsViewer" onclick="if(event.target===this)closeFsViewer()">
    <button class="fs-close" onclick="closeFsViewer()">✕</button>
    <div class="fs-counter" id="fsCounter">1 / 1</div>
    <div class="fs-nav-area">
      <button class="fs-nav-btn" id="fsPrev" onclick="navigateFs(-1)">‹</button>
      <img class="fs-img" id="fsImage" src="" alt="">
      <button class="fs-nav-btn" id="fsNext" onclick="navigateFs(1)">›</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple>

</div><!-- /app-container -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="utils.js"></script>
<script>document.addEventListener("DOMContentLoaded",function(){if(window.initDarkMode)window.initDarkMode();});</script>
<script src="auth.js"></script>

<script type="module">
  import {
    createOrder, listenOrders, listenCustomerOrders, SERVICE_CATEGORIES, SERVICE_BRANDS, PHONE_BRANDS,
    getServicePriceEstimate, countTechsInPincode, countOnlineTechs, getRewards, useReward
  } from './firebase.js?v=2';

  // ── Auth check ───────────────────────────────────────
  const custPhone = localStorage.getItem('custPhone') || '';
  const custName  = localStorage.getItem('custName') || '';
  if (!custPhone || !custName) { window.location.href = 'index.html'; }

  // ── Wizard State ─────────────────────────────────────
  let wizardStep = 1;
  let selDevice = null, selBrand = null, modelName = '', issueDesc = '';
  let deviceImages = [];
  let locationInput = localStorage.getItem('custLocation') || '', pincodeInput = '';
  let mapLat = null, mapLng = null;
  let isSubmitting = false;
  const MAX_IMAGES = 5;
  let availableTechsCount = 0;
  let customerDiscount = 0;
  let multiServices = []; // For multi-service cart

  window._wizModel = '';
  window._wizIssue = '';
  window._wizLoc = locationInput;
  window._wizPin = '';

  // Categories
  const CATEGORIES = SERVICE_CATEGORIES;
  const BRANDS_MAP = SERVICE_BRANDS;

  const WIZARD_STEPS = [
    { num:1, label:'Service', icon:'🔧' },
    { num:2, label:'Brand', icon:'🏷️' },
    { num:3, label:'Model', icon:'✏️' },
    { num:4, label:'Issue', icon:'🔧' },
    { num:5, label:'Photos', icon:'📸' },
    { num:6, label:'Location', icon:'📍' },
    { num:7, label:'Pincode', icon:'📮' },
    { num:8, label:'Confirm', icon:'✅' },
  ];

  function syncWizInputs() {
    modelName = window._wizModel || '';
    issueDesc = window._wizIssue || '';
    locationInput = window._wizLoc || '';
    pincodeInput = window._wizPin || '';
    if (!locationInput.trim() && wizardStep === 6) {
      var domInput = document.getElementById('wizLocation');
      if (domInput && domInput.value.trim()) {
        locationInput = domInput.value.trim();
        window._wizLoc = locationInput;
      }
    }
  }

  // ── Render Wizard ────────────────────────────────────
  function renderWizard() {
    syncWizInputs();
    renderProgressBar();
    renderWizardBody();
    updateWizardButtons();
  }

  function renderProgressBar() {
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    var deviceFlow = svc ? svc.hasDeviceFlow : true;
    var visSteps = WIZARD_STEPS.filter(function(s) { return deviceFlow || (s.num !== 2 && s.num !== 3); });
    var total = visSteps.length;

    document.getElementById('progressScroll').innerHTML = visSteps.map(function(s) {
      var dotClass = wizardStep === s.num ? 'progress-dot active' : wizardStep > s.num ? 'progress-dot done' : 'progress-dot';
      var labelClass = wizardStep >= s.num ? 'progress-label active' : 'progress-label';
      var content = wizardStep > s.num ? '✓' : s.icon;
      return '<div class="progress-step"><div class="' + dotClass + '"><span>' + content + '</span></div><div class="' + labelClass + '">' + s.label + '</div></div>';
    }).join('');

    var curIdx = visSteps.findIndex(function(s) { return s.num === wizardStep; }) + 1;
    document.getElementById('progressFill').style.width = (curIdx / total * 100) + '%';
  }

  function renderWizardBody() {
    var body = document.getElementById('wizardBody');
    switch(wizardStep) {
      case 1: body.innerHTML = renderStepService(); break;
      case 2: body.innerHTML = renderStepBrand(); break;
      case 3: body.innerHTML = renderStepModel(); break;
      case 4: body.innerHTML = renderStepIssue(); break;
      case 5: body.innerHTML = renderStepPhotos(); break;
      case 6: body.innerHTML = renderStepLocation(); break;
      case 7: body.innerHTML = renderStepPincode(); break;
      case 8: body.innerHTML = renderStepConfirm(); break;
    }
  }

  function renderStepService() {
    var techBanner = '';
    if (availableTechsCount > 0) {
      techBanner = '<div style="background:#e8f5e9;padding:10px 14px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;gap:8px;border:1px solid #c8e6c9;">' +
        '<span style="font-size:18px;">🛵</span>' +
        '<span style="font-size:12px;font-weight:700;color:#2e7d32;">' + availableTechsCount + ' technician(s) available now!</span></div>';
    }
    return '<div class="step-body">' + techBanner +
      '<div class="step-title">🔧 Select Service</div><div class="step-subtitle">What do you need help with?</div>' +
      '<div class="service-grid">' +
      CATEGORIES.map(function(s) {
        var active = selDevice === s.key ? 'active' : '';
        var badge = s.hasDeviceFlow ? '<div class="badge">Brand/Model</div>' : '';
        // Show price estimate
        var price = getServicePriceEstimate(s.key);
        return '<div class="service-card ' + active + '" onclick="wizSelectService(\'' + s.key + '\')"><div class="icon">' + s.icon + '</div><div class="name">' + s.label + '</div><div style="font-size:9px;color:#2e7d32;font-weight:700;margin-top:2px;">₹' + price.min + ' - ₹' + price.max + '</div>' + badge + '</div>';
      }).join('') +
      '</div></div>';
  }

  function renderStepBrand() {
    var brands = (selDevice && BRANDS_MAP[selDevice]) || PHONE_BRANDS;
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    return '<div class="step-body"><div class="step-title">🏷️ Select Brand</div><div class="step-subtitle">Choose the brand for ' + (svc?.label || 'your device') + '</div>' +
      '<div class="brand-grid">' +
      brands.map(function(b) {
        var active = selBrand === b ? 'active' : '';
        return '<div class="brand-card ' + active + '" onclick="wizSelectBrand(\'' + b + '\')"><div class="icon">' + (svc?.icon || '📱') + '</div><div class="name">' + b + '</div></div>';
      }).join('') +
      '</div></div>';
  }

  function renderStepModel() {
    return '<div class="step-body"><div class="step-title">✏️ Model / Details</div><div class="step-subtitle">e.g. iPhone 14 Pro Max, Samsung Galaxy S24</div>' +
      '<div class="input-card"><label>Device Model</label><input type="text" id="wizModel" placeholder="e.g. Model..." value="' + modelName.replace(/"/g,'&quot;') + '" oninput="_wizModel=this.value" maxlength="100"></div></div>';
  }

  function renderStepIssue() {
    return '<div class="step-body"><div class="step-title">🔧 Describe the Issue</div><div class="step-subtitle">What\'s wrong? Be specific.</div>' +
      '<div class="input-card"><label>Problem Description</label><textarea id="wizIssue" placeholder="e.g. Screen is cracked, touch not responding..." oninput="_wizIssue=this.value;document.getElementById(\'issueCount\').textContent=this.value.length" maxlength="2000">' + issueDesc.replace(/</g,'&lt;') + '</textarea>' +
      '<div class="char-count"><span id="issueCount">' + issueDesc.length + '</span>/2000</div></div></div>';
  }

  function renderStepPhotos() {
    var uploadBtn = deviceImages.length < MAX_IMAGES
      ? '<div class="media-actions"><div class="media-btn" onclick="pickImages()"><div class="media-btn-icon">🖼️</div><div class="media-btn-label">Gallery</div></div></div>'
      : '';
    return '<div class="step-body"><div class="step-title">📸 Add Photos</div><div class="step-subtitle">Upload photos of the issue (up to 5)</div>' +
      '<div class="media-section"><div class="media-section-title">📷 Photos</div><div class="photo-grid" id="photoGrid"></div>' +
      uploadBtn + '<div class="media-hint" id="photoCount">' + deviceImages.length + '/' + MAX_IMAGES + ' photos added</div></div></div>';
  }

  function renderStepLocation() {
    var badge = (mapLat != null && mapLng != null) ? '<div class="map-coords-badge">📍 Pinned: ' + mapLat.toFixed(5) + ', ' + mapLng.toFixed(5) + '</div>' : '';
    return '<div class="step-body"><div class="step-title">📍 Repair Location</div><div class="step-subtitle">Where should the technician come?</div>' +
      '<div class="input-card"><label>Address</label><div style="position:relative;">' +
      '<input type="text" id="wizLocation" placeholder="Search your repair address..." value="' + locationInput.replace(/"/g,'&quot;') + '" oninput="_wizLoc=this.value;debouncedLocSearch(this.value)" autocomplete="off">' +
      '<div class="loc-suggestions" id="locSuggestions"></div></div>' +
      '<div class="loc-search-hint">🔍 Type at least 3 characters for address suggestions</div></div>' +
      '<button class="gps-btn" onclick="useCurrentLocation()">📍 Use Current Location</button>' +
      '<button class="gps-btn" style="background:#1A3A6B;border:2px solid #FF6B00;" onclick="openMapPicker()">🗺️ Select on Map</button>' + badge + '</div>';
  }

  function renderStepPincode() {
    return '<div class="step-body"><div class="step-title">📮 Pincode</div><div class="step-subtitle">Enter your area pincode</div>' +
      '<div class="input-card"><label>Pincode</label><input type="tel" id="wizPincode" placeholder="e.g. 500081" value="' + pincodeInput + '" maxlength="6" oninput="_wizPin=this.value.replace(/[^0-9]/g,\'\').slice(0,6);this.value=_wizPin"></div></div>';
  }

  function renderStepConfirm() {
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    var deviceFlow = svc ? svc.hasDeviceFlow : false;
    var price = getServicePriceEstimate(selDevice);
    var rows = [
      ['🔧','Service', svc?.label || selDevice],
      ...(deviceFlow ? [['🏷️','Brand', selBrand || '—'], ['✏️','Model', modelName || '—']] : []),
      ['🔧','Issue', issueDesc || '—'],
      ['📸','Photos', deviceImages.length > 0 ? deviceImages.length + ' photo(s)' : 'None'],
      ['📍','Location', locationInput || '—'],
      ['📮','Pincode', pincodeInput || '—'],
      ['💰','Est. Price', '₹' + price.min + ' - ₹' + price.max],
      ['🕐','Est. Time', price.eta || '30-45 mins'],
    ];
    var discountHtml = '';
    if (customerDiscount > 0) {
      discountHtml = '<div style="background:#e8f5e9;padding:10px;border-radius:10px;margin-top:12px;display:flex;align-items:center;gap:8px;border:1px solid #c8e6c9;">' +
        '<span>🎉</span><div><div style="font-size:12px;font-weight:700;color:#2e7d32;">Referral Reward: ₹' + customerDiscount + ' off!</div></div></div>';
    }
    if (availableTechsCount > 0) {
      rows.push(['🛵','Techs Available', availableTechsCount + ' online now']);
    }
    var submitMsg = isSubmitting ? '<div style="text-align:center;padding:20px;"><span style="color:#FF6B00;font-weight:800;">⏳ Uploading & Booking...</span></div>' : '';
    return '<div class="step-body"><div class="step-title">✅ Review & Confirm</div><div class="step-subtitle">Check your booking details</div>' +
      '<div class="review-card">' +
      rows.map(function(r) { return '<div class="review-row"><div class="review-icon">' + r[0] + '</div><div style="flex:1;"><div class="review-label">' + r[1] + '</div><div class="review-value">' + r[2] + '</div></div></div>'; }).join('') +
      '</div>' + discountHtml + submitMsg + '</div>';
  }

  window.wizSelectService = function(key) {
    selDevice = key; selBrand = null; modelName = ''; window._wizModel = '';
    renderWizardBody();
  };
  window.wizSelectBrand = function(brand) {
    selBrand = brand; renderWizardBody();
  };

  window.wizardNext = function() {
    syncWizInputs();
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    var deviceFlow = svc ? svc.hasDeviceFlow : true;
    if (wizardStep === 1 && !selDevice) { window.showToast('Please select a service', 'error'); return; }
    if (wizardStep === 2 && deviceFlow && !selBrand) { window.showToast('Please select a brand', 'error'); return; }
    if (wizardStep === 3 && deviceFlow && !modelName.trim()) { window.showToast('Please enter model', 'error'); return; }
    if (wizardStep === 4 && !issueDesc.trim()) { window.showToast('Please describe the issue', 'error'); return; }
    if (wizardStep === 6 && !locationInput.trim()) { window.showToast('Please enter location', 'error'); return; }
    if (wizardStep === 8) { submitOrder(); return; }
    var next = wizardStep + 1;
    if (!deviceFlow && wizardStep === 1) next = 4;
    wizardStep = Math.min(next, 8);
    renderWizard();
  };

  window.wizardBack = function() {
    syncWizInputs();
    if (wizardStep <= 1) { window.location.href = 'home.html'; return; }
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    var deviceFlow = svc ? svc.hasDeviceFlow : true;
    var prev = wizardStep - 1;
    if (!deviceFlow && wizardStep === 4) prev = 1;
    wizardStep = prev;
    renderWizard();
  };

  function updateWizardButtons() {
    var btn = document.getElementById('wizardNextBtn');
    if (wizardStep === 8) { btn.innerHTML = isSubmitting ? '⏳ Booking...' : '✅ Submit Booking'; btn.disabled = isSubmitting; }
    else { btn.innerHTML = 'Continue →'; btn.disabled = false; }
    var backBtn = document.getElementById('wizardBackBtn');
    backBtn.textContent = wizardStep <= 1 ? '← Cancel' : '← Back';
  }

  async function submitOrder() {
    syncWizInputs();
    var svc = CATEGORIES.find(function(s) { return s.key === selDevice; });
    var deviceFlow = svc ? svc.hasDeviceFlow : false;
    if (!selDevice || !issueDesc.trim()) { window.showToast('Missing info', 'error'); return; }
    if (deviceFlow && (!selBrand || !modelName.trim())) { window.showToast('Missing brand/model', 'error'); return; }
    if (!locationInput.trim()) { window.showToast('Missing location', 'error'); return; }
    isSubmitting = true; updateWizardButtons();
    try {
      var order = {
        customerName: custName, customerPhone: custPhone,
        location: locationInput.trim(), pincode: pincodeInput.trim(),
        serviceCategory: selDevice, serviceLabel: svc?.label || selDevice,
        device: deviceFlow ? selDevice : null, brand: deviceFlow ? selBrand : null,
        modelName: deviceFlow ? modelName.trim() : '',
        description: issueDesc.trim(), images: deviceImages.length > 0 ? deviceImages : null,
        status: 'pending', time: new Date().toLocaleTimeString(),
      };
      if (mapLat != null && mapLng != null) { order.lat = mapLat; order.lng = mapLng; }
      var result = await createOrder(order);
      localStorage.setItem('lastOrderId', result.orderId);
      if (locationInput) localStorage.setItem('custLocation', locationInput.trim());
      window.showToast('✅ Booking Confirmed!', 'success');
      if (confirm('Booking confirmed! Would you like to track your technician?')) {
        window.location.href = 'tracking.html?orderId=' + result.orderId;
      } else { window.location.href = 'orders.html'; }
    } catch(e) {
      console.error('Submit error:', e);
      window.showToast('❌ Booking failed! Please try again.', 'error');
    } finally { isSubmitting = false; updateWizardButtons(); }
  }

  // ── Image Picker ─────────────────────────────────────
  window.pickImages = function() {
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInput').click();
  };
  document.getElementById('fileInput').addEventListener('change', function(e) {
    var files = Array.from(this.files).filter(function(f) { return f.type.startsWith('image/'); });
    files.forEach(function(file) {
      if (deviceImages.length >= MAX_IMAGES) return;
      if (file.size > 5 * 1024 * 1024) { window.showToast(file.name + ' too large (max 5MB)', 'error'); return; }
      deviceImages.push(URL.createObjectURL(file));
    });
    updatePhotoGrid();
  });
  function updatePhotoGrid() {
    var grid = document.getElementById('photoGrid'); if (!grid) return;
    grid.innerHTML = deviceImages.map(function(url, i) {
      return '<div class="photo-item"><img src="' + url + '" alt="photo"><button class="remove-btn" onclick="removePhoto(' + i + ')">✕</button></div>';
    }).join('');
    document.getElementById('photoCount').textContent = deviceImages.length + '/' + MAX_IMAGES + ' photos added';
  }
  window.removePhoto = function(index) { deviceImages.splice(index, 1); updatePhotoGrid(); if (wizardStep === 5) renderWizardBody(); };

  // ── Location Search ──────────────────────────────────
  var locSearchTimer = null, locSearchAbort = null;
  window.debouncedLocSearch = function(val) {
    clearTimeout(locSearchTimer);
    var dropdown = document.getElementById('locSuggestions'); if (!dropdown) return;
    if (val.length < 3) { dropdown.classList.remove('show'); dropdown.innerHTML = ''; return; }
    locSearchTimer = setTimeout(function() { searchLocSuggestions(val); }, 350);
  };
  async function searchLocSuggestions(query) {
    var dropdown = document.getElementById('locSuggestions'); if (!dropdown) return;
    if (locSearchAbort) locSearchAbort.abort();
    locSearchAbort = new AbortController();
    try {
      var res = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=5&addressdetails=1', { signal: locSearchAbort.signal });
      var data = await res.json();
      if (!data || data.length === 0) { dropdown.innerHTML = '<div class="loc-suggestion-item" style="color:#888;cursor:default;">🔍 No results found</div>'; dropdown.classList.add('show'); return; }
      dropdown.innerHTML = data.map(function(place, i) {
        var shortName = (place.display_name || '').split(',').slice(0,3).join(',');
        var region = (place.display_name || '').split(',').slice(3,5).join(',').trim();
        return '<div class="loc-suggestion-item ' + (i === 0 ? 'active' : '') + '" data-lat="' + place.lat + '" data-lng="' + place.lon + '" data-name="' + shortName.replace(/"/g,'&quot;') + '"><span class="icon">📍</span><div><div class="name">' + shortName.replace(/</g,'&lt;') + '</div>' + (region ? '<div class="region">' + region.replace(/</g,'&lt;') + '</div>' : '') + '</div></div>';
      }).join('');
      dropdown.classList.add('show');
    } catch(e) { if (e.name !== 'AbortError') console.warn('Loc search error:', e); }
  }
  document.addEventListener('click', function(e) {
    var dropdown = document.getElementById('locSuggestions');
    if (!dropdown || !dropdown.contains(e.target)) return;
    var item = e.target.closest('[data-lat]'); if (!item) return;
    var lat = item.getAttribute('data-lat'), lng = item.getAttribute('data-lng'), name = item.getAttribute('data-name');
    if (!lat || !lng || !name) return;
    mapLat = parseFloat(lat); mapLng = parseFloat(lng); locationInput = name;
    window._wizLoc = name; dropdown.classList.remove('show'); dropdown.innerHTML = '';
    var input = document.getElementById('wizLocation'); if (input) input.value = name;
    window.showToast('📍 Location selected!', 'success');
  });

  window.useCurrentLocation = function() {
    if (!navigator.geolocation) { window.showToast('GPS not supported', 'error'); return; }
    navigator.geolocation.getCurrentPosition(
      async function(pos) {
        mapLat = pos.coords.latitude; mapLng = pos.coords.longitude;
        try { var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + mapLat + '&lon=' + mapLng + '&format=json'); var data = await res.json(); if (data.display_name) { locationInput = data.display_name.split(',').slice(0,3).join(','); } } catch(e) { locationInput = mapLat.toFixed(4) + ', ' + mapLng.toFixed(4); }
        window._wizLoc = locationInput; if (wizardStep === 6) renderWizardBody();
        window.showToast('📍 Location found!', 'success');
      }, function() { window.showToast('⚠️ Could not get location', 'error'); },
      { timeout: 10000, enableHighAccuracy: true }
    );
  };

  // ── Map Picker ───────────────────────────────────────
  var pickerMap = null, pickerMarker = null, pickerLat = null, pickerLng = null, pickerLayer = 'standard', pickerTileLayer = null;
  window.openMapPicker = function() {
    document.getElementById('mapPickerOverlay').classList.add('show');
    setTimeout(function() { initPickerMap(); }, 300);
  };
  window.closeMapPicker = function() {
    document.getElementById('mapPickerOverlay').classList.remove('show');
    if (pickerMap) { pickerMap.remove(); pickerMap = null; pickerMarker = null; }
  };
  function initPickerMap() {
    if (pickerMap) { pickerMap.invalidateSize(); return; }
    var container = document.getElementById('mapPickerContainer');
    var startLat = mapLat || 20.5937, startLng = mapLng || 78.9629;
    pickerMap = L.map(container, { zoomControl: true, attributionControl: false }).setView([startLat, startLng], 5);
    pickerTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(pickerMap);
    pickerMarker = L.marker([startLat, startLng], { draggable: true }).addTo(pickerMap);
    pickerLat = startLat; pickerLng = startLng;
    pickerMarker.on('dragend', function() { var p = pickerMarker.getLatLng(); pickerLat = p.lat; pickerLng = p.lng; updatePickerCoords(); });
    pickerMap.on('click', function(e) { pickerLat = e.latlng.lat; pickerLng = e.latlng.lng; pickerMarker.setLatLng([pickerLat, pickerLng]); updatePickerCoords(); });
    if (!mapLat && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) { pickerMap.setView([pos.coords.latitude, pos.coords.longitude], 14); pickerMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]); pickerLat = pos.coords.latitude; pickerLng = pos.coords.longitude; updatePickerCoords(); }, function() {}, { timeout: 8000, enableHighAccuracy: true });
    }
    updatePickerCoords();
    setTimeout(function() { pickerMap.invalidateSize(); }, 300);
  }
  function updatePickerCoords() { document.getElementById('mapPickerCoords').textContent = '📍 ' + pickerLat.toFixed(5) + ', ' + pickerLng.toFixed(5); document.getElementById('confirmMapBtn').disabled = false; }
  window.confirmMapPick = function() { mapLat = pickerLat; mapLng = pickerLng; window.closeMapPicker(); window.showToast('📍 Location pinned!', 'success'); };
  window.switchMapLayer = function(layer) {
    if (!pickerMap || layer === pickerLayer) return;
    pickerLayer = layer; if (pickerTileLayer) pickerMap.removeLayer(pickerTileLayer);
    if (layer === 'standard') { pickerTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(pickerMap); }
    else { pickerTileLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(pickerMap); }
  };
  window.mapPickerGoMyLocation = function() {
    if (!navigator.geolocation) { window.showToast('GPS not supported', 'error'); return; }
    navigator.geolocation.getCurrentPosition(function(pos) { if (pickerMap) pickerMap.setView([pos.coords.latitude, pos.coords.longitude], 15); if (pickerMarker) pickerMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]); pickerLat = pos.coords.latitude; pickerLng = pos.coords.longitude; updatePickerCoords(); window.showToast('📍 Moved to your location', 'success'); }, function() { window.showToast('⚠️ Could not get location', 'error'); }, { timeout: 10000, enableHighAccuracy: true });
  };

  // ── Image Viewer (full-screen) ───────────────────────
  var fsImages = [], fsIndex = 0;
  window.openFsViewer = function(urls, startIdx) { fsImages = urls; fsIndex = startIdx || 0; document.getElementById('fsViewer').classList.add('show'); updateFsViewer(); };
  window.closeFsViewer = function() { document.getElementById('fsViewer').classList.remove('show'); };
  window.navigateFs = function(dir) { fsIndex = Math.max(0, Math.min(fsImages.length - 1, fsIndex + dir)); updateFsViewer(); };
  function updateFsViewer() { document.getElementById('fsImage').src = fsImages[fsIndex]; document.getElementById('fsCounter').textContent = (fsIndex + 1) + ' / ' + fsImages.length; document.getElementById('fsPrev').disabled = fsIndex === 0; document.getElementById('fsNext').disabled = fsIndex >= fsImages.length - 1; }

  // ── Map picker search ────────────────────────────────
  var mapSearchTimer = null, mapSearchAbort = null;
  window.debouncedMapSearch = function(val) {
    clearTimeout(mapSearchTimer);
    var ss = document.getElementById('mapSearchSuggestions'); if (!ss) return;
    if (val.length < 3) { ss.classList.remove('show'); ss.innerHTML = ''; return; }
    mapSearchTimer = setTimeout(function() {
      if (mapSearchAbort) mapSearchAbort.abort(); mapSearchAbort = new AbortController();
      fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(val) + '&format=json&limit=5', { signal: mapSearchAbort.signal })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data || data.length === 0) { ss.innerHTML = '<div class="loc-suggestion-item" style="color:#888;">🔍 No results</div>'; ss.classList.add('show'); return; }
          ss.innerHTML = data.map(function(p, i) {
            return '<div class="loc-suggestion-item ' + (i === 0 ? 'active' : '') + '" data-lat="' + p.lat + '" data-lng="' + p.lon + '" data-name="' + (p.display_name || '').split(',').slice(0,3).join(',').replace(/"/g,'&quot;') + '"><span class="icon">📍</span><div><div class="name">' + (p.display_name || '').split(',').slice(0,2).join(',').replace(/</g,'&lt;') + '</div></div></div>';
          }).join('');
          ss.classList.add('show');
        }).catch(function(e) { if (e.name !== 'AbortError') console.warn(e); });
    }, 350);
  };
  document.addEventListener('click', function(e) {
    var ss = document.getElementById('mapSearchSuggestions');
    if (!ss || !ss.contains(e.target)) return;
    var item = e.target.closest('[data-lat]'); if (!item) return;
    var lat = item.getAttribute('data-lat'), lng = item.getAttribute('data-lng'), name = item.getAttribute('data-name');
    if (!lat || !lng || !name) return;
    ss.classList.remove('show'); ss.innerHTML = '';
    document.getElementById('mapSearchInput').value = name;
    if (pickerMap) { pickerMap.setView([parseFloat(lat), parseFloat(lng)], 15); pickerMarker.setLatLng([parseFloat(lat), parseFloat(lng)]); pickerLat = parseFloat(lat); pickerLng = parseFloat(lng); updatePickerCoords(); }
  });

  // ── Load rewards and tech count ──────────────────────
  (async function() {
    if (custPhone) {
      try {
        var rewards = await getRewards(custPhone);
        customerDiscount = rewards.discount || 0;
        if (customerDiscount > 0) {
          window.showToast('🎉 You have ₹' + customerDiscount + ' reward discount available!', 'success');
        }
      } catch(e) {}
    }
    try {
      availableTechsCount = await countOnlineTechs();
      console.log('📊 Techs available:', availableTechsCount);
    } catch(e) {}
  })();

  // ── Init ─────────────────────────────────────────────
  renderWizard();
  // Check if service was passed via URL
  var urlParams = new URLSearchParams(window.location.search);
  var presetService = urlParams.get('service');
  if (presetService) {
    var found = CATEGORIES.find(function(s) { return s.key === presetService; });
    if (found) { selDevice = presetService; renderWizardBody(); }
  }
</script>

<script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(e) { console.log('SW reg failed:', e); }); }</script>
</body>
