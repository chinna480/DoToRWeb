name: Deploy Website & Admin to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Website to Vercel (Production)
        run: |
          vercel deploy website \
            --prod \
            --yes \
            --scope ramb0s-projects \
            --token ${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    name: Deploy Admin Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Admin Dashboard to Vercel (Production)
        run: |
          vercel deploy admin \
            --prod \
            --yes \
            --scope ramb0s-projects \
            --token ${{ secrets.VERCEL_TOKEN }}
