name: Publish OTA Updates

on:
  push:
    branches:
      - main
    # Only trigger when mobile code/assets change, not for docs or configs
    paths:
      - 'app/**'
      - 'components/**'
      - 'constants/**'
      - 'hooks/**'
      - 'assets/**'
      - 'package.json'
      - 'app.json'
      - 'eas.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update to production branch
        run: eas update --branch production --message "Auto-update: ${{ github.event.head_commit.message }}"
