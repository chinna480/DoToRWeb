name: Build DoToR APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Prevent infinite loop: skip runs triggered by our own [skip ci] commits
jobs:
  build:
    runs-on: ubuntu-latest
    if: "github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install

      - name: Fix Expo package versions
        run: npx expo install --fix

      - name: Generate native Android project files
        run: npx expo prebuild --platform android --no-install --clean

      - name: Validate google-services.json
        run: |
          FILE="google-services.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: $FILE not found!"
            exit 1
          fi
          echo "✅ $FILE exists"

          PACKAGE_NAME=$(node -e "console.log(require('./app.json').expo.android.package)" 2>/dev/null)
          JSON_PACKAGE=$(node -e "const f=require('./$FILE'); console.log(f.client[0].client_info.android_client_info.package_name)" 2>/dev/null || echo "")

          if [ "$PACKAGE_NAME" != "$JSON_PACKAGE" ]; then
            echo "❌ Package name mismatch! app.json=$PACKAGE_NAME  $FILE=$JSON_PACKAGE"
            exit 1
          fi
          echo "✅ Package name matches: $PACKAGE_NAME"

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.DOTOR_RELEASE_KEYSTORE }}" | base64 -d > android/app/dotor-release.keystore
          chmod 600 android/app/dotor-release.keystore
          echo "✅ Keystore decoded"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        run: npx eas-cli build --local --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_DOCTOR_SKIP: true

      - name: Find APK (newest one)
        run: |
          APK=$(find . -name "*.apk" -not -path "*/node_modules/*" -printf '%T@ %p\n' | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -z "$APK" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "✅ APK found: $APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename "$APK")" >> $GITHUB_ENV

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoToR-APK-${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
