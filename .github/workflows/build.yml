name: Build DoToR APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Fix Expo package versions
        run: npx expo install --fix

      - name: Validate google-services.json
        run: |
          FILE="google-services.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: $FILE not found!"
            exit 1
          fi
          echo "✅ $FILE exists"

          PACKAGE_NAME=$(node -e "console.log(require('./app.json').expo.android.package)" 2>/dev/null)
          if [ -z "$PACKAGE_NAME" ]; then
            echo "❌ ERROR: Could not read android.package from app.json"
            exit 1
          fi
          echo "   Expected package: $PACKAGE_NAME"

          JSON_PACKAGE=$(node -e "const f=require('./$FILE'); console.log(f.client[0].client_info.android_client_info.package_name)" 2>/dev/null || echo "")
          if [ -z "$JSON_PACKAGE" ]; then
            echo "❌ ERROR: $FILE is not valid or missing required fields"
            exit 1
          fi
          echo "   Found package in $FILE: $JSON_PACKAGE"

          if [ "$PACKAGE_NAME" != "$JSON_PACKAGE" ]; then
            echo "❌ Package name mismatch!"
            echo "   app.json: $PACKAGE_NAME"
            echo "   $FILE:    $JSON_PACKAGE"
            exit 1
          fi
          echo "✅ Package name matches!"

      - name: Prebuild Android
        run: npx expo prebuild --no-install --platform android

      - name: Pin Gradle to 8.0.2 (Expo 50 compatible)
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Pin Android Gradle Plugin to 8.1.0
        run: |
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.1.0/g' android/build.gradle
          echo "✅ android/build.gradle AGP version:"
          grep 'com.android.tools.build' android/build.gradle

      - name: Grant Execute Permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DoToR-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk