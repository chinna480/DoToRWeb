name: Build Android APK

on:
  push:
    branches: [ main, newmain ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate required secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Missing required secret: GOOGLE_SERVICES_JSON"
            exit 1
          fi
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "::error::Missing required secret: GOOGLE_MAPS_API_KEY"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Verify android folder exists
        run: ls -la android/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Test JS Bundle
        run: |
          npx expo export --platform android 2>&1

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace 2>&1 | grep -A 20 "createBundleReleaseJsAndAssets\|error\|Error\|FAILURE" | head -80

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DoToR-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Check secret exists
      - name: Validate required secrets
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Error: Missing required secret: GOOGLE_SERVICES_JSON"
            exit 1
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      # 6. Install packages
      - name: Install dependencies
        run: npm install

      # 7. Create google-services.json
      - name: Create google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      # 8. Install Expo CLI
      - name: Install Expo CLI
        run: npm install -g @expo/cli

      # 9. Build Android folder
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # 10. Check android folder
      - name: Verify android folder exists
        run: ls -la android/

      # 11. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 12. Build APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 13. Upload APK — Download from GitHub Actions!
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DoToR-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30