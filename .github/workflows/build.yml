name: Build DoToR APK

on:
  push:
    branches:
      - main

# Prevent infinite loop: skip runs triggered by our own [skip ci] commits
jobs:
  build:
    runs-on: ubuntu-latest
    if: "github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version bump & commit message extraction

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install

      - name: Fix Expo package versions
        run: npx expo install --fix

      - name: Generate native Android project files
        run: npx expo prebuild --platform android --no-install --clean

      - name: Validate google-services.json
        run: |
          FILE="google-services.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: $FILE not found!"
            exit 1
          fi
          echo "✅ $FILE exists"

          PACKAGE_NAME=$(node -e "console.log(require('./app.json').expo.android.package)" 2>/dev/null)
          JSON_PACKAGE=$(node -e "const f=require('./$FILE'); console.log(f.client[0].client_info.android_client_info.package_name)" 2>/dev/null || echo "")

          if [ "$PACKAGE_NAME" != "$JSON_PACKAGE" ]; then
            echo "❌ Package name mismatch! app.json=$PACKAGE_NAME  $FILE=$JSON_PACKAGE"
            exit 1
          fi
          echo "✅ Package name matches: $PACKAGE_NAME"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        run: npx eas-cli build --local --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_DOCTOR_SKIP: true

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoToR-APK
          path: build-*.apk

      # ── AUTO-UPDATE: Bump version.json so app users see the update popup ──
      - name: Update version.json with new build info
        run: |
          node -e "
            const fs = require('fs');
            const v = require('./website/version.json');
            const [major, minor, patch] = v.version.split('.').map(Number);
            const newVer = major + '.' + minor + '.' + (patch + 1);
            const runUrl = 'https://github.com/${{ github.repository }}/actions/runs/' + process.env.RUN_ID;
            const now = new Date().toISOString().slice(0, 10);
            const { execSync } = require('child_process');
            const log = execSync('git log --format=\"%s\" -5 --no-merges', { encoding: 'utf8' });
            const notes = log.trim().split('\n')
              .filter(function(m) { return !m.includes('[skip ci]'); })
              .map(function(m) { return m.replace(/^(feat|fix|chore|refactor|docs): /, ''); })
              .map(function(m) { return '✨ ' + m; });
            if (notes.length === 0) notes.push('🔧 Performance improvements and bug fixes');
            var newVersion = {
              version: newVer,
              versionCode: Number(process.env.RUN_ID),
              minVersionCode: 1,
              updateUrl: runUrl,
              releaseDate: now,
              releaseNotes: notes,
              forceUpdate: false
            };
            fs.writeFileSync('./website/version.json', JSON.stringify(newVersion, null, 2) + '\n');
            console.log('Version updated to ' + newVer);
            var pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = newVer;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json version updated to ' + newVer);
          "
        env:
          RUN_ID: ${{ github.run_id }}

      - name: Commit & Push version bump back to repo
        run: |
          git config user.name "DoToR Bot"
          git config user.email "bot@dotor.app"

          # Use GITHUB_TOKEN for push authentication
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add website/version.json package.json

          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "No changes to commit — skipping"
          else
            NEW_VER=$(node -e "console.log(require('./package.json').version)")
            git commit -m "chore: bump version to ${NEW_VER} [skip ci]"
            git push origin HEAD:main
            echo "✅ Version bump committed and pushed: ${NEW_VER}"
          fi